name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app-build:
    name: App build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Check version and build
        working-directory: app
        run: npm run build
